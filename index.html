<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mutatd - Software & Scripts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        .terminal {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .prompt {
            color: #7ee787;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .prompt::before {
            content: "$ ";
            color: #58a6ff;
        }

        h1 {
            font-size: 3rem;
            color: #58a6ff;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .tagline {
            color: #8b949e;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .btn {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: #30363d;
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .description {
            text-align: left;
            background: #0d1117;
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #8b949e;
        }

        .description p {
            margin-bottom: 0.5rem;
        }

        .description p:last-child {
            margin-bottom: 0;
        }

        .blink {
            animation: blink 1s step-end infinite;
            color: #58a6ff;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="terminal">
            <div class="prompt">whoami</div>
            <h1>mutatd</h1>
            <p class="tagline">Software, scripts, and tools<span class="blink">_</span></p>

            <div class="links">
                <a href="https://github.com/mutatd" class="btn">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">

                    </svg>
                    GitHub Profile
                </a>
                <a href="https://github.com/mutatd?tab=repositories" class="btn">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/>
                    </svg>
                    Repositories

            </div>

            <div class="description">
              <a href='https://raw.githubusercontent.com/mutatd/misc/refs/heads/main/termux.sh'>Termux</a>
            </div>
        </div>
        <footer>
            mutatd &copy; 2026 — Built with ❤️ and caffeine
        </footer>
    </div>
</body>
</html>
